name = "appapprove-app-aa-agentic-v17-min"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
# Worker entry is server.ts (a CF-Workers Module-Worker wrapper around the
# Remix vite build at ./build/server/index.js). Wrangler bundles server.ts
# via esbuild on each deploy, so the build/server import resolves at deploy
# time. Pointing main directly at build/server/index.js fails because the
# Remix vite-built output has no `export default { fetch }` and wrangler
# treats it as Service-Worker format (which rejects node:* imports).
main = "./server.ts"

# Static assets (Remix vite client bundle). Wrangler matches incoming paths
# against this directory first; on a miss the request falls through to the
# Worker entry (server.ts → Remix request handler). Replaces the legacy
# [site] / Workers Sites block — that one needed the CF API token to carry
# `Workers KV Storage:Edit` (Sites stores assets in KV) and would 401 on
# the first deploy if the token lacked it.
[assets]
directory = "./build/client"

# F-112 — wrangler bundler alias for the Remix-Vite virtual server-build
# module. Vite's @remix-run/dev plugin emits `virtual:remix/server-build`
# at dev-time, but at deploy time wrangler bundles server.ts via esbuild
# (not vite) and esbuild can't resolve the virtual import without an
# explicit alias. The scaffold's server.ts uses the canonical
# `./build/server` import, but if the AI/patcher rewrites it to the
# virtual:remix form (both are valid Remix idioms), this alias keeps the
# deploy from breaking.
[alias]
"virtual:remix/server-build" = "./build/server"

# AppApprove provisions custom routes / KV bindings / secrets at deploy
# time. Don't edit the [vars] section by hand — use the AppApprove dashboard.
[vars]
APPAPPROVE_PROJECT_SLUG = "aa-agentic-v17-min"

# CF Cron Triggers — uncomment + add schedules here, then mirror them in
# appapprove.config.ts `crons` so the dispatcher knows which handler to
# call. AppApprove's deploy pipeline diffs the two and warns on drift.
# [triggers]
# crons = [
#   "0 * * * *",        # hourly
#   "0 0 * * *",        # daily at 00:00 UTC
# ]

# CF Queues — define a producer + consumer for each queue you use. The
# AppApprove deploy pipeline auto-provisions the queue on first deploy.
# [[queues.producers]]
# binding = "MY_QUEUE"
# queue = "aa-agentic-v17-min-jobs"

# [[queues.consumers]]
# queue = "aa-agentic-v17-min-jobs"
# max_batch_size = 10
# max_batch_timeout = 5
